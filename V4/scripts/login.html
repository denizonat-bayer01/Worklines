<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Worklines Pro Consulting - Client Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#135bec",
            "background-light": "#f6f6f8",
            "background-dark": "#101622",
            "wp-blue": "#005A9C",
            "wp-slate": "#333333",
            "wp-light-grey": "#F4F7F9",
            "wp-error": "#D32F2F"
          },
          fontFamily: {
            "display": ["Inter", "sans-serif"]
          },
          borderRadius: {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px"
          },
        },
      },
    }
  </script>
<style>
    body {
      font-family: 'Inter', sans-serif;
    }
  </style>
</head>
<body class="bg-wp-light-grey font-display">
<div class="relative flex min-h-screen w-full flex-col items-center justify-center bg-background-light dark:bg-background-dark p-4 group/design-root" style="--checkbox-tick-svg: url('data:image/svg+xml,%3csvg viewBox=%270 0 16 16%27 fill=%27rgb(255,255,255)%27 xmlns=%27http://www.w3.org/2000/svg%27%3e%3cpath d=%27M12.207 4.793a1 1 0 010 1.414l-5 5a1 1 0 01-1.414 0l-2-2a1 1 0 011.414-1.414L6.5 9.086l4.293-4.293a1 1 0 011.414 0z%27/%3e%3c/svg%3e');">
<div class="flex w-full max-w-md flex-col overflow-hidden rounded-xl border border-gray-200 bg-white shadow-lg">
<div class="flex flex-col gap-8 p-8 md:p-12">
<div class="flex w-full items-center justify-center">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-wp-blue text-4xl">
              assessment
            </span>
<p class="text-2xl font-bold text-wp-slate">Worklines Pro</p>
</div>
</div>
<div class="flex flex-col gap-2 text-center">
<p class="text-wp-slate text-3xl font-black leading-tight tracking-[-0.033em]">Welcome to Trackingsystem</p>
<p class="text-gray-500 text-base font-normal leading-normal">Please enter your details to login.</p>
</div>
<div class="flex flex-col gap-6">
<div class="flex flex-col gap-4">
<label class="flex flex-col">
<p class="text-wp-slate text-base font-medium leading-normal pb-2">Username</p>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-wp-slate focus:outline-0 focus:ring-2 focus:ring-wp-blue/50 border border-[#dbdfe6] bg-white h-14 placeholder:text-[#616f89] p-[15px] text-base font-normal leading-normal" placeholder="Enter your username or email" value=""/>
</label>
<label class="flex flex-col">
<p class="text-wp-slate text-base font-medium leading-normal pb-2">Password</p>
<div class="flex w-full flex-1 items-stretch">
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-l-lg text-wp-slate focus:outline-0 focus:ring-2 focus:ring-wp-blue/50 border border-r-0 border-[#dbdfe6] bg-white h-14 placeholder:text-[#616f89] p-[15px] pr-2 text-base font-normal leading-normal" placeholder="Enter your password" type="password" value=""/>
<div class="text-[#616f89] flex border border-l-0 border-[#dbdfe6] bg-white items-center justify-center pr-[15px] rounded-r-lg">
<span class="material-symbols-outlined cursor-pointer">
                    visibility
                  </span>
</div>
</div>
</label>
</div>
<div class="flex items-center justify-between">
<label class="flex cursor-pointer select-none items-center gap-x-3">
<input class="h-5 w-5 rounded border-2 border-[#dbdfe6] bg-transparent text-wp-blue checked:border-wp-blue checked:bg-wp-blue checked:bg-[image:--checkbox-tick-svg] focus:ring-0 focus:ring-offset-0 focus:outline-none" type="checkbox"/>
<p class="text-wp-slate text-base font-normal leading-normal">Remember Me</p>
</label>
<a class="text-sm font-medium text-wp-blue hover:underline" href="#">Forgot Password?</a>
</div>
<button class="flex h-14 w-full items-center justify-center gap-2 whitespace-nowrap rounded-lg bg-wp-blue px-5 py-3 text-base font-semibold leading-none text-white shadow-sm transition-colors hover:bg-opacity-90 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-wp-blue/50 disabled:pointer-events-none disabled:opacity-50">Login</button>
</div>
</div>
<div class="flex items-center justify-center gap-1 border-t border-gray-200 bg-gray-50 px-8 py-4">
<span class="material-symbols-outlined text-sm text-gray-500">lock</span>
<p class="text-center text-xs text-gray-500">© 2024 Worklines Pro Consulting. All rights reserved.</p>
</div>
</div>
</div>
</body></html>
